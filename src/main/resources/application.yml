spring:
  application:
    name: kb-pay-discount
  datasource:
    url: jdbc:h2:mem:kbpaydb;DB_CLOSE_DELAY=-1;MODE=Oracle;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}
